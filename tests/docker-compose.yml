version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: okf-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ecommerce
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql
    restart: always

  postgres:
    image: postgres:15
    container_name: okf-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql
    restart: always

  mongodb:
    image: mongo:7
    container_name: okf-mongodb-test
    ports:
      - "27017:27017"
    restart: always
