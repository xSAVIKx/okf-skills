name: OKF Catalog (Pages)

# Regenerate the OKF bundle of this repository on every push to master and
# publish it as the repo's GitHub Pages site (a browsable okf-viz catalog).
#
# Double duty: when a GEMINI_KEY secret is present this workflow also acts as an
# end-to-end SELF-TEST of our own skills — the Gemini CLI drives the full
# pipeline through okf-fs (produce) -> okf-enrich (enrich) -> okf-viz (render),
# reusing each SKILL.md via `gemini skills` exactly as a third-party agent
# harness would. A deterministic fallback guarantees the site still publishes if
# the agent path is unavailable or stumbles.
#
# Cost model — kept low:
#   * produce/render are pure-Go and deterministic; the agent only adds the
#     enrichment judgement on top, and only for NEW (placeholder) descriptions.
#   * Only git-tracked files are checked out, so the catalog is clean by design.
#   * Enriched descriptions are synced to .okf-metadata.yaml and held in a
#     rolling Actions cache, so the agent only ever sees genuinely new files.
#   * The Gemini CLI is installed from npm with the npm cache reused between runs.
#   * Publishing uses the official Pages actions: no gh-pages branch, no commits
#     to master (honouring the repo's PR-only workflow).
#
# One-time setup: optionally add a repository secret GEMINI_KEY (a Gemini API key
# from Google AI Studio) to enable the agent self-test + enrichment. Pages is
# enabled automatically by configure-pages.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress deploys finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  GO_VERSION: "1.26"
  GEMINI_CLI_VERSION: "0.45.0"
  CATALOG_TITLE: "okf-skills knowledge catalog"
  # These Pages/cache actions are the latest majors but still ship on Node 20;
  # run them on Node 24 (becomes the runner default 2026-06-16) to clear the
  # deprecation warning and stay future-proof.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Produce, (optionally) enrich, render
    runs-on: ubuntu-latest
    env:
      GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"

      - name: Configure Pages (enables Pages if not already)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Pre-build the connector binaries OUTSIDE the worktree and put them on
      # PATH. The agent self-test then exercises the okf-fs/okf-viz *commands*
      # (the skill surface) without rebuilding them in-tree, and the same
      # binaries back the deterministic fallback below.
      - name: Build okf-fs and okf-viz (outside the worktree)
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          ( cd skills/okf-fs  && go build -o "$RUNNER_TEMP/bin/okf-fs"  . )
          ( cd skills/okf-viz && go build -o "$RUNNER_TEMP/bin/okf-viz" . )
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      # Restore the enriched-description store so okf-fs reuses prior work and
      # the agent only sees genuinely new files. Rolling key: always saves a
      # fresh cache (run_id is unique) while restoring the most recent prior one.
      - name: Restore description cache
        if: env.GEMINI_KEY != ''
        uses: actions/cache@v4
        with:
          path: .okf-metadata.yaml
          key: okf-metadata-${{ github.run_id }}
          restore-keys: |
            okf-metadata-

      # Gemini CLI runs on Node; cache npm downloads so reinstalls are fast.
      - name: Cache npm (Gemini CLI)
        if: env.GEMINI_KEY != ''
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-gemini-cli-${{ runner.os }}-${{ env.GEMINI_CLI_VERSION }}

      - name: Set up Node
        if: env.GEMINI_KEY != ''
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Self-test: drive EVERY okf-skill call through the Gemini CLI, reusing our
      # own skills. Flags verified against `gemini --help` (v0.45): -p runs one
      # prompt headlessly; --approval-mode yolo auto-approves tool use;
      # --skip-trust trusts the CI workspace; --include-directories grants access
      # to the bundle outside the workspace. Auth is non-interactive via
      # GEMINI_API_KEY. Best-effort — a CLI/auth hiccup must not fail the site.
      - name: Self-test pipeline via Gemini CLI (okf-fs + okf-enrich + okf-viz)
        if: env.GEMINI_KEY != ''
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_KEY }}
          BUNDLE: ${{ runner.temp }}/bundle
        run: |
          set -euo pipefail
          npm install -g "@google/gemini-cli@${GEMINI_CLI_VERSION}"
          gemini --version

          # Reuse our own skills: register them so the agent auto-discovers them.
          for s in okf-fs okf-viz okf-enrich okf-reader; do
            gemini skills link "$PWD/skills/$s" --scope user --consent
          done

          # One headless run drives EVERY okf-skill call through gemini:
          # produce -> enrich -> render -> ingest (persist for the cache).
          cat > "$RUNNER_TEMP/prompt.txt" <<EOF
          You are running headlessly in CI as an end-to-end self-test of our OKF skills.
          The okf-fs and okf-viz skill binaries are ALREADY built and on PATH as 'okf-fs' and 'okf-viz' — do NOT build, clone, or 'go install' them; just run their commands. The working directory is the repository root, and our okf-* skills are registered (consult the okf-enrich skill for the enrichment quality rules).

          Using our own skills, perform the full pipeline in order:
          1. okf-fs (produce): run 'okf-fs produce --dir . --out ${BUNDLE}'. okf-fs automatically reuses descriptions from .okf-metadata.yaml.
          2. okf-enrich (enrich): for EVERY concept doc in ${BUNDLE} whose frontmatter 'description' is still the placeholder (exactly 'File <name>' or 'Directory <name>'), write one concise description grounded only in the path, name and extension — grain first (what it is), then purpose — per the okf-enrich quality rules. Edit ONLY the frontmatter 'description:' field; preserve type/title/resource/tags/timestamp and the whole body byte-for-byte; never modify index.md or log.md. Skip concepts that already have a substantive description.
          3. okf-viz (render): run 'okf-viz render --bundle ${BUNDLE} --offline --title "${CATALOG_TITLE}"'.
          4. okf-fs (ingest): run 'okf-fs ingest --dir . --bundle ${BUNDLE} --sync' to persist your enriched descriptions into .okf-metadata.yaml.

          Do not touch any files outside ${BUNDLE} and .okf-metadata.yaml. Work fully autonomously without asking for confirmation. Finish by confirming ${BUNDLE}/index.html exists.
          EOF
          gemini -p "$(cat "$RUNNER_TEMP/prompt.txt")" \
            --approval-mode yolo \
            --skip-trust \
            --include-directories "$BUNDLE" < /dev/null

      # Safety net: guarantee a published catalog. When GEMINI_KEY is set the
      # Gemini CLI path above already produced/rendered, so these direct binary
      # calls are skipped; they run only when there is no key or the agent did
      # not complete (the degraded path).
      - name: Ensure catalog (deterministic fallback)
        env:
          BUNDLE: ${{ runner.temp }}/bundle
        run: |
          set -euo pipefail
          if [ ! -f "$BUNDLE/index.md" ]; then
            okf-fs produce --dir . --out "$BUNDLE"
          fi
          if [ ! -f "$BUNDLE/index.html" ]; then
            okf-viz render --bundle "$BUNDLE" --offline --title "$CATALOG_TITLE"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/bundle

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
