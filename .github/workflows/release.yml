name: Release

# Conventional-commit driven releases for every Go module in the monorepo.
#
# Flow:
#   1. A normal merge to master makes release-please open/refresh a single
#      "release PR" that bumps each changed module's version + CHANGELOG.
#   2. Merging that release PR makes release-please create a GitHub Release and a
#      git tag per changed module, in Go's required `<path>/vX.Y.Z` form
#      (e.g. okf-go/v0.2.0, skills/okf-fs/v0.2.0). Pushing the tag *is* publishing
#      a Go module — the proxy serves it on first request.
#   3. The warm-proxy job primes proxy.golang.org for each freshly tagged module
#      so `go install ...@latest` resolves immediately instead of after the
#      module mirror's indexing lag.
#   4. The verify-install job reproduces an end user's `go install <module>@vX`
#      WITHOUT the go.work workspace, catching a stale intra-repo okf-go pin or
#      go.sum that the workspace hides during normal CI. See RELEASING.md.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

env:
  # Match the toolchain pinned in go.work so workspace resolution is exact.
  GO_VERSION: "1.26"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released: ${{ steps.rp.outputs.paths_released }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-pins:
    name: Sync intra-repo okf-go pins into the release PR
    needs: release-please
    # Runs when release-please opened/updated a release PR (not on the tag-cut
    # run). Bumps each consumer's `require okf-go` to the new lockstep version
    # and refreshes go.sum, then commits it back to the release PR — so the
    # tagged commit is internally consistent and installs standalone. Strategy B
    # in RELEASING.md; the okf-go tag is resolved locally (it is not pushed yet).
    if: needs.release-please.outputs.pr != '' && needs.release-please.outputs.pr != 'null'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release PR branch
        id: pr
        env:
          PR: ${{ needs.release-please.outputs.pr }}
        run: |
          # The release-please `pr` output is a JSON PullRequest object. Fall
          # back to release-please's default branch name if the field is absent.
          head="$(echo "$PR" | jq -r '.headBranchName // empty')"
          [ -z "$head" ] && head="release-please--branches--${GITHUB_REF_NAME}"
          echo "Release PR branch: $head"
          echo "head=$head" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      - name: Bump okf-go pins + refresh go.sum
        run: bash scripts/sync-intra-deps.sh
      - name: Commit back to the release PR if anything changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "pins already in sync — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync okf-go pins + go.sum for release"
          git push origin "HEAD:${{ steps.pr.outputs.head }}"

  warm-proxy:
    name: Prime Go module proxy
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Request each released module from proxy.golang.org
        env:
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        run: |
          set -euo pipefail
          # Go module proxy escapes uppercase letters as '!'+lowercase, so the
          # repo owner "xSAVIKx" becomes "x!s!a!v!i!kx".
          BASE="github.com/x!s!a!v!i!kx/okf-skills"
          echo "$PATHS_RELEASED" | jq -r '.[]' | while read -r path; do
            [ -z "$path" ] && continue
            version=$(jq -r --arg p "$path" '.[$p]' .release-please-manifest.json)
            url="https://proxy.golang.org/${BASE}/${path}/@v/v${version}.info"
            echo "Warming ${path}@v${version}"
            # Retry: the mirror fetches asynchronously on first request.
            curl -fsS --retry 8 --retry-all-errors --retry-delay 15 "$url" \
              && echo "  indexed" \
              || echo "  still indexing (will resolve automatically shortly)"
          done

  verify-install:
    name: Verify standalone installability
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      - name: Install each released module without the workspace
        # Reproduces an end user's `go install <module>@vX`. go.work shadows the
        # intra-repo okf-go pin during dev, so this is the first place a stale
        # pin or go.sum surfaces. The script uses GOPROXY=direct (avoids proxy
        # indexing lag right after tagging) and GOSUMDB=off (skips the lagging
        # checksum DB) while still verifying each module's committed go.sum.
        run: bash scripts/verify-release.sh
