<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="{{.InitTheme}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}}</title>
<style>{{.CSS}}</style>
</head>
<body>
<header id="topbar">
  <span id="bundle-title">{{.Title}}</span>
  <span class="spacer"></span>
  <input id="search" type="search" placeholder="Search concepts…" aria-label="Search">
  <select id="layout" aria-label="Graph layout">
    <option value="fcose">fcose</option>
    <option value="cola">cola</option>
    <option value="dagre">dagre</option>
    <option value="breadthfirst">breadthfirst</option>
    <option value="concentric">concentric</option>
    <option value="circle">circle</option>
    <option value="grid">grid</option>
  </select>
  <label id="hops-label" title="Spotlight neighborhood depth (hops)">hops <input type="number" id="hops" min="0" max="6" value="1" style="width:3.2em"></label>
  <button id="trace" title="Trace shortest path: click Trace, then two nodes">Trace</button>
  <label id="er-toggle-label" title="Entity-relationship mode"><input type="checkbox" id="er-mode"> ER</label>
  <label id="cluster-toggle-label" title="Collapse directories into super-nodes (tap a directory to expand)"><input type="checkbox" id="cluster"> Cluster</label>
  <label id="coverage-toggle-label" title="Color nodes by enrichment state"><input type="checkbox" id="coverage-overlay"> Coverage</label>
  <select id="theme" aria-label="Theme">
    <option value="system">System</option>
    <option value="light">Light</option>
    <option value="dark">Dark</option>
  </select>
  <button id="export-png" title="Export the graph as a PNG">PNG</button>
  <button id="export-json" title="Export the visible subgraph as JSON">JSON</button>
  <button id="toggle-nav" title="Toggle navigator">☰</button>
  <button id="toggle-graph" title="Toggle graph">◉</button>
  <button id="toggle-reader" title="Toggle reader">▤</button>
</header>
<main id="panes">
  <aside id="nav" role="navigation" aria-label="Concept navigator"><div id="filters" role="group" aria-label="Type filters"></div><ul id="tree" role="listbox" aria-label="Concepts"></ul></aside>
  <section id="graph" role="application" aria-label="Concept graph" tabindex="0"></section>
  <article id="reader" role="main" aria-label="Concept reader"><p class="empty">Select a concept.</p></article>
</main>
<script type="application/json" id="okf-data">{{.DataJSON}}</script>
{{.LibTag}}
<script>{{.AppJS}}</script>
</body>
</html>
